name: MLOps Sales Forecast Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install xgboost scikit-learn pandas huggingface_hub

    - name: Data Preparation
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        # Script to fetch from HF dataset space, clean, split and push back
        python scripts/data_preparation.py

    - name: Model Training and Registration
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        # Script to load train/test, train model, evaluate, and push to HF model hub
        python scripts/train_model.py

    - name: Deploy to Hugging Face Spaces
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        # Call the hosting script to push all deployment files to Hugging Face Space
        python scripts/deploy.py
